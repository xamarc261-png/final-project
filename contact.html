<section class="services">

<h1>Contact Us</h1>

<p>Fill out the form below to contact Economic Fashion.</p>

<form>

<label>Full Name</label><br>
<input type="text" placeholder="Enter your full name" required><br><br>

<label>Email Address</label><br>
<input type="email" placeholder="example@gmail.com" required><br><br>

<label>Password</label><br>
<input type="password" minlength="8" required><br><br>

<label>Phone Number</label><br>
<input type="tel" placeholder="+252..." required><br><br>

<label>Gender</label><br>

<input type="radio" name="gender"> Male

<input type="radio" name="gender"> Female

<br><br>

<label>Country</label><br>

<select required>

<option>Select Country</option>

<option>Somalia</option>

<option>Kenya</option>

<option>Ethiopia</option>

<option>Djibouti</option>

</select>

<br><br>

<label>Favorite Products</label><br>

<input type="checkbox"> Shirts

<input type="checkbox"> Dresses

<input type="checkbox"> Shoes

<input type="checkbox"> Jackets

<br><br>

<label>Your Message</label><br>

<textarea rows="6" cols="50"
placeholder="Write your message here..."
required></textarea>

<br><br>

<input class="btn" type="submit" value="Send Message">

</form>

</section>
